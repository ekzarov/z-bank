# Site settings
title: Bank of Z 
description: Sample Z application showing how to work with mainframe software
baseurl: "/IBMZAtlas/Bank-of-Z-doc"
url: "https://pages.github.ibm.com"

# Build settings
markdown: kramdown
theme: jekyll-theme-cayman

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "docs"
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - scripts/
  - TOC_GUIDE.md
  - EDITING_GUIDE.md
  - STYLE_GUIDE.md
  - DYNAMIC_TOC_GUIDE.md
  - SETUP_COMPLETE.md
