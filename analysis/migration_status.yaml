schema_version: 1
project: Bank of Z modernization
updated: 2026-07-21

methodology_stage:
  number: 2
  name: Control reconnaissance
  status: awaiting-independent-pass-002
  last_completed_stage: 1

next_action:
  actor: independent-agent
  pass_number: 2
  report: analysis/reviews/stage-02-pass-002.md
  instruction: >-
    Perform a fresh code-first inventory, then compare it with the corrected
    parity map and legacy reconnaissance. Recheck every pass-001 finding and
    record the result in analysis/reviews/stage-02-pass-002.md.
  completion_gate: >-
    A different eligible independent agent records a clean Stage 2 pass with no
    new findings and the workbook audit reports AUDIT OK.

review_pass_schema:
  required_fields:
    - stage
    - pass
    - date
    - agent
    - result
    - report
  allowed_results:
    - clean
    - findings
    - blocked

review_passes:
  - stage: 2
    pass: 1
    date: 2026-07-21
    agent: OpenAI Codex independent reviewer
    result: findings
    report: analysis/reviews/stage-02-pass-001.md

owner_gates:
  constitution_ratification: pending
  implementation_approval: not-applicable-before-stage-5
  stage_3_fallback_decision:
    status: pending-if-live-walkthrough-unavailable
    allowed_modes:
      - simulate
      - waive
    selected_mode: null
    approved_by: null
    approved_on: null
    rationale: null
    scope: null
    residual_risk: null
    permitted_next_stage: null

known_blockers:
  - id: stage-02-pass-001-findings
    affects_stage: 2
    status: resolved-awaiting-independent-verification
    detail: >-
      All ten findings were corrected in the parity map and reconnaissance;
      pass 002 must independently verify the corrections and completeness.
    evidence: analysis/reviews/stage-02-pass-001.md; analysis/legacy_user_flows.xlsx; analysis/legacy_reconnaissance.md
  - id: full-legacy-runtime
    affects_stage: 3
    status: blocked-by-external-infrastructure
    detail: >-
      Full CICS, IMS, DB2, 3270, API, and batch observation requires an
      authorized IBM z/OS/Wazi or verified compatible environment.
    evidence: analysis/cobol_deployment_overview.md

stage_transition_policy:
  blocked_stage: >-
    A blocked Stage 3 remains incomplete. If a full live walkthrough is not
    possible, the agent asks the owner to select simulate or waive and records
    approver, date, rationale, scope, residual risk, and permitted next stage.
    Simulated or skipped behavior remains unverified until the blocker is
    removed and a real walkthrough is completed.
  stage_3_outcomes:
    live-verified: Real legacy behavior was observed for the declared scope.
    partial-simulated: >-
      Behavior was exercised through traceable mocks or emulation, but the real
      legacy runtime remains unverified.
    blocked-waived: >-
      The owner accepted progression without a substitute run; skipped behavior
      remains blocked and unverified.
  approval_inference: >-
    A merge, successful check, or agent statement never implies owner approval.

governed_artifacts:
  filled_workbook: analysis/legacy_user_flows.xlsx
  empty_template: analysis/legacy_user_flows_template.xlsx
  workbook_instructions: analysis/legacy_user_flows_template_instructions.md
  review_protocol: analysis/reviews/README.md
  review_template: analysis/reviews/review_template.md
  methodology: analysis/migration_methodology.md
  constitution: .specify/memory/constitution.md
